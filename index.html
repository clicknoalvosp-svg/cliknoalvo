<script>
var dados = { nome:'', telefone:'', email:'', q1:'', q2:'', q3:'' };

// GA helper
function track(evento, opcao) {
  gtag('event', evento, { opcao_escolhida: opcao });
}

function responder(passo, opcao, btn) {
  btn.parentElement.querySelectorAll('.opt').forEach(function(b){ b.classList.remove('selected'); });
  btn.classList.add('selected');

  if(passo === 0) dados.q1 = opcao;
  if(passo === 1) dados.q2 = opcao;
  if(passo === 2) dados.q3 = opcao;

  track('quiz_pergunta_' + (passo + 1), opcao);

  setTimeout(function(){ avancar(passo); }, 550);
}

function confirmarDados() {
  var nome     = document.getElementById('nome').value.trim();
  var telefone = document.getElementById('telefone').value.trim();
  var email    = document.getElementById('email').value.trim();

  if(!nome){
    document.getElementById('nome').focus();
    document.getElementById('nome').style.borderColor='#ff4d4d';
    return;
  }
  if(!telefone){
    document.getElementById('telefone').focus();
    document.getElementById('telefone').style.borderColor='#ff4d4d';
    return;
  }
  if(!email){
    document.getElementById('email').focus();
    document.getElementById('email').style.borderColor='#ff4d4d';
    return;
  }

  dados.nome     = nome;
  dados.telefone = telefone;
  dados.email    = email;

  // GA (sem dados pessoais)
  track('quiz_dados_preenchidos', 'ok');

  // META — Advanced Matching
  fbq('init', '1644837116658924', {
    em: dados.email,
    ph: dados.telefone
  });

  avancar(3);
}

function avancar(passo) {
  document.getElementById('b' + passo).classList.remove('visible');
  document.getElementById('dot' + passo).classList.remove('active');

  if(passo < 3){
    var prox = passo + 1;
    document.getElementById('b' + prox).classList.add('visible');
    document.getElementById('dot' + prox).classList.add('active');

    track('quiz_etapa_visualizada', 'etapa_' + (prox + 1));

  } else {

    // Envio do lead
    fetch('https://formspree.io/f/mvzwqjgn', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        Nome:      dados.nome,
        WhatsApp:  dados.telefone,
        Email:     dados.email,
        Pergunta1: dados.q1,
        Pergunta2: dados.q2,
        Pergunta3: dados.q3,
        _subject:  '🎯 Novo diagnóstico – ' + dados.nome + ' – Click no Alvo'
      })
    });

    // GA — conversão padrão
    gtag('event', 'generate_lead', {
      method: 'quiz'
    });

    // META — Lead otimizado
    fbq('track', 'Lead', {
      content_name: 'Diagnostico Quiz',
      value: 1,
      currency: 'BRL'
    });

    // Personalização
    document.getElementById('msg-nome').innerHTML =
      'PRONTO, <em>' + dados.nome.toUpperCase() + '!</em>';

    var msg = encodeURIComponent(
      'Olá! Sou ' + dados.nome +
      ' e acabei de preencher o diagnóstico da Click no Alvo. Quero receber minha análise!'
    );

    document.getElementById('wpp-oferta').href =
      'https://wa.me/5511978910701?text=' + msg;

    document.getElementById('bfinal').classList.add('visible');
  }
}

// Scroll reveal (mantido)
(function(){
  var els = document.querySelectorAll('.reveal');
  if(!els.length) return;
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }
    });
  },{threshold:.1});
  els.forEach(function(el){ io.observe(el); });
})();
</script>
